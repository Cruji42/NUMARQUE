<div class="page-header has-tab">
    <h2 class="font-weight-normal">Perfil</h2>
</div>
<nz-tabset class="page-header-tab">
    <nz-tab nzTitle="">
        <div class="container">
            <nz-card nzTitle="Información básica">
                <div class="media align-items-center">
                    <nz-avatar [nzSize]="80" nzIcon="user" [nzSrc]="profile_picture_url"></nz-avatar>
                    <div class="m-l-20 m-r-20">
                        <h5 class="m-b-5 font-size-18">Foto de perfil</h5>
                        <p class="opacity-07 font-size-13 m-b-0">
                            Dimensiones Recomendadas: <br>
                            120x120 tamaño maximo: 5MB
                        </p>
                    </div>
                    <nz-upload nzName="profile_picture" [nzShowUploadList]="true" [nzBeforeUpload]="beforeUpload"
                        [nzAccept]="'image/png,image/jpeg,image/jpg'" >
                        <button nz-button nzType="primary">
                            <span>Cargar</span>
                        </button>
                    </nz-upload>
                </div>
                <hr class="m-v-25">

                <form nz-form [formGroup]="form" (ngSubmit)="submitForm()">
                    <div class="row">
                        <div class="col-md-6">
                            <nz-form-item>
                                <nz-form-label nzFor="name">Nombre</nz-form-label>
                                <nz-form-control>
                                    <input nz-input formControlName="name" nz-input placeholder="Nombre" type="text">
                                </nz-form-control>
                            </nz-form-item>
                        </div>
                        <div class="col-md-6">
                            <nz-form-item>
                                <nz-form-label>Apellido</nz-form-label>
                                <nz-form-control>
                                    <input nz-input placeholder="Apellido" type="text" formControlName="last_name"
                                        nz-input>
                                </nz-form-control>
                            </nz-form-item>
                        </div>
                        <div class="col-md-12">
                            <nz-form-item>
                                <nz-form-label>Compañia</nz-form-label>
                                <nz-form-control>
                                    <input nz-input placeholder="Compañia" type="text" formControlName="company"
                                        nz-input>
                                </nz-form-control>
                            </nz-form-item>
                        </div>
                        <div class="d-flex justify-content-end">
                            <nz-form-item>
                                <nz-form-control>
                                    <button nz-button nzType="primary" [disabled]="form.invalid"
                                        [nzLoading]="isConfirmLoading">Editar</button>
                                </nz-form-control>
                            </nz-form-item>
                        </div>
                    </div>
                </form>
